<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Spenden</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      text-align: center;
      width: 320px;
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
    }

    h1 {
      margin-bottom: 15px;
    }

    input {
      width: 85%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      text-align: center;
      font-size: 15px;
    }

    button {
      margin-top: 10px;
      background: linear-gradient(to right, #0072ff, #00c6ff);
      border: none;
      padding: 12px 25px;
      border-radius: 25px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 10px #00c6ff;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .thanks {
      margin-top: 20px;
      display: none;
      font-size: 18px;
      color: #a0e9ff;
    }

    .loader {
      margin-top: 15px;
      display: none;
      font-size: 14px;
      color: #ccc;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>💙 Spenden</h1>
  <p>Unterstütze uns</p>

  <input type="text" id="name" placeholder="Dein Name">
  <input type="number" id="amount" placeholder="Betrag (€)" min="1">

  <br>
  <button id="donateBtn" onclick="spenden()">Spenden</button>

  <div class="loader" id="loader">Wird verarbeitet...</div>

  <div class="thanks" id="thanksMessage"></div>
</div>

<script>
function spenden() {
  const name = document.getElementById("name").value.trim();
  const amount = document.getElementById("amount").value;
  const btn = document.getElementById("donateBtn");
  const loader = document.getElementById("loader");
  const thanks = document.getElementById("thanksMessage");

  if (name === "" || amount === "" || amount <= 0) {
    alert("Bitte Name und gültigen Betrag eingeben.");
    return;
  }

  // UI ändern
  btn.disabled = true;
  loader.style.display = "block";

  // Fake-Zahlungsverarbeitung (realistisch)
  setTimeout(() => {
    loader.style.display = "none";

    thanks.innerHTML = `🌊 Danke, <b>${name}</b>!<br>
    Deine Spende von <b>${amount}€</b> wurde erfolgreich übermittelt. 💙`;

    thanks.style.display = "block";

    btn.innerText = "Gespendet ✓";
  }, 2000);
}
</script>

</body>
</html>
